<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="100%" height="320">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a1a2e"/>
    </linearGradient>

    <!-- Cyan glow gradient -->
    <radialGradient id="glow1" cx="20%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#00ffe7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00ffe7" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="80%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ff3838" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff3838" stop-opacity="0"/>
    </radialGradient>

    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ffe7" stroke-width="0.3" opacity="0.15"/>
    </pattern>

    <!-- Neon text gradient -->
    <linearGradient id="neonText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffe7"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ff3838"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>
  <rect width="1200" height="320" fill="url(#glow1)"/>
  <rect width="1200" height="320" fill="url(#glow2)"/>

  <!-- Decorative top line -->
  <line x1="60" y1="40" x2="1140" y2="40" stroke="#00ffe7" stroke-width="1" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
  </line>
  <circle cx="60" cy="40" r="3" fill="#00ffe7"/>
  <circle cx="1140" cy="40" r="3" fill="#ff3838"/>

  <!-- Brackets decoration -->
  <text x="80" y="75" fill="#00ffe7" font-family="JetBrains Mono, monospace" font-size="14" opacity="0.6">[ SYSTEM_INITIALIZED ]</text>
  <text x="980" y="75" fill="#ff3838" font-family="JetBrains Mono, monospace" font-size="14" opacity="0.6">[ STATUS: ONLINE ]</text>

  <!-- Main title -->
  <text x="600" y="160" text-anchor="middle" fill="url(#neonText)" font-family="Inter, Arial Black, sans-serif" font-size="72" font-weight="900" letter-spacing="6" filter="url(#strongGlow)">
    ABDULMALEK ALGHAMDI
  </text>

  <!-- Pulsing animation accent -->
  <text x="600" y="160" text-anchor="middle" fill="#00ffe7" font-family="Inter, Arial Black, sans-serif" font-size="72" font-weight="900" letter-spacing="6" opacity="0.3">
    ABDULMALEK ALGHAMDI
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2.5s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle line 1 -->
  <text x="600" y="200" text-anchor="middle" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="18" font-weight="500" letter-spacing="3" opacity="0.95">
    SYSTEM ARCHITECT × AI ENGINEER
  </text>

  <!-- Divider stars -->
  <text x="600" y="232" text-anchor="middle" fill="#00ffe7" font-family="monospace" font-size="14" letter-spacing="8" opacity="0.7">
    ◆ ◆ ◆
  </text>

  <!-- Subtitle line 2 -->
  <text x="600" y="262" text-anchor="middle" fill="#00ffe7" font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" letter-spacing="2" filter="url(#cyanGlow)">
    RANK #2 OF COHORT  ·  CHANNELS BY STC  ·  AL-RAKEEN  ·  CLASS OF 2026
  </text>

  <!-- Bottom decorative line -->
  <line x1="60" y1="290" x2="1140" y2="290" stroke="#00ffe7" stroke-width="1" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
  </line>
  <circle cx="60" cy="290" r="3" fill="#ff3838"/>
  <circle cx="1140" cy="290" r="3" fill="#00ffe7"/>

  <!-- Side decorations -->
  <g opacity="0.6">
    <text x="30" y="165" fill="#00ffe7" font-family="monospace" font-size="20">{</text>
    <text x="1160" y="165" fill="#ff3838" font-family="monospace" font-size="20">}</text>
  </g>

  <!-- Animated dots -->
  <circle cx="100" cy="160" r="2" fill="#00ffe7">
    <animate attributeName="cy" values="160;150;160" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="160" r="2" fill="#ff3838">
    <animate attributeName="cy" values="160;170;160" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
