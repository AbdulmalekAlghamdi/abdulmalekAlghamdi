<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="100%">
  <defs>
    <linearGradient id="archBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>

    <linearGradient id="layer1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff3838" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff3838" stop-opacity="0.05"/>
    </linearGradient>

    <linearGradient id="layer2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9b59b6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#9b59b6" stop-opacity="0.05"/>
    </linearGradient>

    <linearGradient id="layer3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffe7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00ffe7" stop-opacity="0.05"/>
    </linearGradient>

    <linearGradient id="layer4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2ecc71" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="0.05"/>
    </linearGradient>

    <filter id="archGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#00ffe7"/>
    </marker>

    <pattern id="archDots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="#00ffe7" opacity="0.15"/>
    </pattern>
  </defs>

  <rect width="1200" height="600" fill="url(#archBg)"/>
  <rect width="1200" height="600" fill="url(#archDots)"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" fill="#00ffe7" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700" letter-spacing="4" filter="url(#archGlow)">
    ◆ HOW I PROCESS PROBLEMS · END-TO-END PIPELINE ◆
  </text>

  <!-- LAYER 1: INPUT (Red) -->
  <rect x="40" y="80" width="1120" height="100" fill="url(#layer1)" stroke="#ff3838" stroke-width="1" stroke-dasharray="4,4" rx="8"/>
  <text x="60" y="105" fill="#ff3838" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" letter-spacing="2">[ LAYER_01 ]  INPUT — BUSINESS CHAOS</text>

  <g font-family="Inter, sans-serif">
    <rect x="100" y="120" width="160" height="45" fill="#1a0a2e" stroke="#ff3838" stroke-width="1.5" rx="6"/>
    <text x="180" y="142" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">💼 Stakeholder Needs</text>
    <text x="180" y="158" text-anchor="middle" fill="#ff3838" font-size="9" opacity="0.7">unclear · evolving</text>

    <rect x="290" y="120" width="160" height="45" fill="#1a0a2e" stroke="#ff3838" stroke-width="1.5" rx="6"/>
    <text x="370" y="142" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">📋 Business Goals</text>
    <text x="370" y="158" text-anchor="middle" fill="#ff3838" font-size="9" opacity="0.7">strategic · measurable</text>

    <rect x="480" y="120" width="160" height="45" fill="#1a0a2e" stroke="#ff3838" stroke-width="1.5" rx="6"/>
    <text x="560" y="142" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">⚖️ Constraints</text>
    <text x="560" y="158" text-anchor="middle" fill="#ff3838" font-size="9" opacity="0.7">budget · time · scope</text>

    <rect x="670" y="120" width="160" height="45" fill="#1a0a2e" stroke="#ff3838" stroke-width="1.5" rx="6"/>
    <text x="750" y="142" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">🎯 Pain Points</text>
    <text x="750" y="158" text-anchor="middle" fill="#ff3838" font-size="9" opacity="0.7">friction · bottlenecks</text>

    <rect x="860" y="120" width="160" height="45" fill="#1a0a2e" stroke="#ff3838" stroke-width="1.5" rx="6"/>
    <text x="940" y="142" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">🌐 Domain Context</text>
    <text x="940" y="158" text-anchor="middle" fill="#ff3838" font-size="9" opacity="0.7">industry · regulations</text>
  </g>

  <!-- Arrows down -->
  <line x1="180" y1="170" x2="180" y2="210" stroke="#00ffe7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="370" y1="170" x2="370" y2="210" stroke="#00ffe7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="170" x2="560" y2="210" stroke="#00ffe7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="750" y1="170" x2="750" y2="210" stroke="#00ffe7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="940" y1="170" x2="940" y2="210" stroke="#00ffe7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LAYER 2: ANALYSIS (Purple) -->
  <rect x="40" y="220" width="1120" height="100" fill="url(#layer2)" stroke="#9b59b6" stroke-width="1" stroke-dasharray="4,4" rx="8"/>
  <text x="60" y="245" fill="#9b59b6" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" letter-spacing="2">[ LAYER_02 ]  ANALYSIS — DECOMPOSE & MODEL</text>

  <g font-family="Inter, sans-serif">
    <rect x="100" y="260" width="160" height="45" fill="#1a0a2e" stroke="#9b59b6" stroke-width="1.5" rx="6"/>
    <text x="180" y="282" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">🔍 Requirements</text>
    <text x="180" y="298" text-anchor="middle" fill="#9b59b6" font-size="9" opacity="0.7">functional · non-functional</text>

    <rect x="290" y="260" width="160" height="45" fill="#1a0a2e" stroke="#9b59b6" stroke-width="1.5" rx="6"/>
    <text x="370" y="282" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">📐 UML / BPMN</text>
    <text x="370" y="298" text-anchor="middle" fill="#9b59b6" font-size="9" opacity="0.7">process · use cases</text>

    <rect x="480" y="260" width="160" height="45" fill="#1a0a2e" stroke="#9b59b6" stroke-width="1.5" rx="6"/>
    <text x="560" y="282" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">🧩 User Stories</text>
    <text x="560" y="298" text-anchor="middle" fill="#9b59b6" font-size="9" opacity="0.7">acceptance criteria</text>

    <rect x="670" y="260" width="160" height="45" fill="#1a0a2e" stroke="#9b59b6" stroke-width="1.5" rx="6"/>
    <text x="750" y="282" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">📊 Risk Mapping</text>
    <text x="750" y="298" text-anchor="middle" fill="#9b59b6" font-size="9" opacity="0.7">technical · business</text>

    <rect x="860" y="260" width="160" height="45" fill="#1a0a2e" stroke="#9b59b6" stroke-width="1.5" rx="6"/>
    <text x="940" y="282" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">🤝 Stakeholder Sync</text>
    <text x="940" y="298" text-anchor="middle" fill="#9b59b6" font-size="9" opacity="0.7">validation · sign-off</text>
  </g>

  <!-- Arrows down -->
  <line x1="180" y1="310" x2="180" y2="350" stroke="#00ffe7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="370" y1="310" x2="370" y2="350" stroke="#00ffe7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="310" x2="560" y2="350" stroke="#00ffe7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="750" y1="310" x2="750" y2="350" stroke="#00ffe7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="940" y1="310" x2="940" y2="350" stroke="#00ffe7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LAYER 3: BUILD (Cyan) -->
  <rect x="40" y="360" width="1120" height="100" fill="url(#layer3)" stroke="#00ffe7" stroke-width="1" stroke-dasharray="4,4" rx="8"/>
  <text x="60" y="385" fill="#00ffe7" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" letter-spacing="2">[ LAYER_03 ]  BUILD — ENGINEER & SHIP</text>

  <g font-family="Inter, sans-serif">
    <rect x="100" y="400" width="160" height="45" fill="#1a0a2e" stroke="#00ffe7" stroke-width="1.5" rx="6"/>
    <text x="180" y="422" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">☕ Spring Boot</text>
    <text x="180" y="438" text-anchor="middle" fill="#00ffe7" font-size="9" opacity="0.7">backend services</text>

    <rect x="290" y="400" width="160" height="45" fill="#1a0a2e" stroke="#00ffe7" stroke-width="1.5" rx="6"/>
    <text x="370" y="422" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">⚛️ React + Tailwind</text>
    <text x="370" y="438" text-anchor="middle" fill="#00ffe7" font-size="9" opacity="0.7">frontend interfaces</text>

    <rect x="480" y="400" width="160" height="45" fill="#1a0a2e" stroke="#00ffe7" stroke-width="1.5" rx="6"/>
    <text x="560" y="422" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">🤖 YOLOv8 + OpenCV</text>
    <text x="560" y="438" text-anchor="middle" fill="#00ffe7" font-size="9" opacity="0.7">computer vision</text>

    <rect x="670" y="400" width="160" height="45" fill="#1a0a2e" stroke="#00ffe7" stroke-width="1.5" rx="6"/>
    <text x="750" y="422" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">🧠 GPT / LLM</text>
    <text x="750" y="438" text-anchor="middle" fill="#00ffe7" font-size="9" opacity="0.7">generative AI</text>

    <rect x="860" y="400" width="160" height="45" fill="#1a0a2e" stroke="#00ffe7" stroke-width="1.5" rx="6"/>
    <text x="940" y="422" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">🗄️ SQL / NoSQL</text>
    <text x="940" y="438" text-anchor="middle" fill="#00ffe7" font-size="9" opacity="0.7">data persistence</text>
  </g>

  <!-- Converging arrows to layer 4 -->
  <path d="M 180 450 Q 400 490 600 510" fill="none" stroke="#00ffe7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 370 450 Q 500 490 600 510" fill="none" stroke="#00ffe7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="450" x2="600" y2="510" stroke="#00ffe7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 750 450 Q 700 490 600 510" fill="none" stroke="#00ffe7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 940 450 Q 800 490 600 510" fill="none" stroke="#00ffe7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LAYER 4: OUTPUT (Green) -->
  <rect x="40" y="500" width="1120" height="80" fill="url(#layer4)" stroke="#2ecc71" stroke-width="1" stroke-dasharray="4,4" rx="8"/>
  <text x="60" y="525" fill="#2ecc71" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" letter-spacing="2">[ LAYER_04 ]  OUTPUT — PRODUCTION VALUE</text>

  <g font-family="Inter, sans-serif">
    <rect x="450" y="535" width="300" height="35" fill="#000" stroke="#2ecc71" stroke-width="2" rx="6" filter="url(#archGlow)"/>
    <text x="600" y="558" text-anchor="middle" fill="#2ecc71" font-size="14" font-weight="700">🚀 SHIPPED · MEASURED · ITERATED</text>
  </g>

  <!-- Side decorations -->
  <text x="20" y="100" fill="#ff3838" font-family="JetBrains Mono, monospace" font-size="10" opacity="0.5">01</text>
  <text x="20" y="240" fill="#9b59b6" font-family="JetBrains Mono, monospace" font-size="10" opacity="0.5">02</text>
  <text x="20" y="380" fill="#00ffe7" font-family="JetBrains Mono, monospace" font-size="10" opacity="0.5">03</text>
  <text x="20" y="520" fill="#2ecc71" font-family="JetBrains Mono, monospace" font-size="10" opacity="0.5">04</text>

  <text x="1180" y="100" fill="#ff3838" font-family="JetBrains Mono, monospace" font-size="10" opacity="0.5" text-anchor="end">▼</text>
  <text x="1180" y="240" fill="#9b59b6" font-family="JetBrains Mono, monospace" font-size="10" opacity="0.5" text-anchor="end">▼</text>
  <text x="1180" y="380" fill="#00ffe7" font-family="JetBrains Mono, monospace" font-size="10" opacity="0.5" text-anchor="end">▼</text>
  <text x="1180" y="520" fill="#2ecc71" font-family="JetBrains Mono, monospace" font-size="10" opacity="0.5" text-anchor="end">★</text>
</svg>
